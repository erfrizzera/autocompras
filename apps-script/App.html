<!DOCTYPE html>
<html>
<head>
<base target="_top">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    color-scheme: light;
    --bg: #edf1f4;
    --surface: #ffffff;
    --surface-2: #e4eaee;
    --line: rgba(0,48,64,0.10);
    --line-strong: rgba(0,48,64,0.18);
    --text: #1a2e35;
    --muted: rgba(0,48,64,0.55);
    --green: #00546a;
    --green-strong: #003040;
    --amber: #8a4f10;
    --amber-bg: #f6ebdc;
    --red: #c0392b;
    --red-bg: #fdeaea;
    --green-bg: #dcebee;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 15px; line-height: 1.5;
  }
  .pagina { max-width: 1080px; margin: 0 auto; padding: 1.25rem 1rem 5rem; }
  h1 { font-size: 22px; font-weight: 700; margin: 0; color: var(--green-strong); }
  h2 { font-size: 16px; font-weight: 600; margin: 0 0 0.5rem; }
  h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 1.5rem 0 0.5rem; }
  p { margin: 0; }
  .cabecalho { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 12px; }
  .abas { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 4px; margin-bottom: 1.25rem; }
  .aba { flex: 1; text-align: center; padding: 9px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; user-select: none; }
  .aba.ativa { background: var(--green); color: #fff; }
  .secao { display: none; }
  .secao.visivel { display: block; }
  .cartao { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 0.5rem 1.25rem; margin-bottom: 0.75rem; box-shadow: 0 2px 9px rgba(0,48,64,0.05); }
  .cartao.pad { padding: 1rem 1.25rem; }
  .linha-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .linha-item:last-child { border-bottom: none; }
  .linha-item[data-abrir] { cursor: pointer; }
  .linha-item.selecionado .nome { color: var(--green); font-weight: 600; }
  .miniatura { width: 50px; height: 50px; border-radius: 8px; background: var(--surface-2); object-fit: contain; flex-shrink: 0; }
  .miniatura.pequena { width: 40px; height: 40px; }
  .info-item { flex: 1; min-width: 0; }
  .info-item p.nome { font-size: 14px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .info-item p.preco { font-size: 12px; color: var(--muted); }
  .stepper { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .stepper button { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--line-strong); background: var(--surface); color: var(--text); cursor: pointer; font-size: 16px; line-height: 1; }
  .stepper span { min-width: 20px; text-align: center; font-size: 15px; font-weight: 600; }
  .botao-x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; flex-shrink: 0; }
  input[type=text] {
    width: 100%; height: 40px; padding: 0 12px; border-radius: var(--radius);
    border: 1px solid var(--line-strong); background: var(--surface); color: var(--text); font-size: 14px;
  }
  input[type=text]:focus { outline: none; border-color: var(--green); }
  button.botao {
    height: 40px; padding: 0 16px; border-radius: var(--radius); border: 1px solid var(--line-strong);
    background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap;
  }
  button.botao:active { transform: scale(0.98); }
  button.primario { background: var(--green); border-color: var(--green); color: #fff; }
  button.primario:hover { background: var(--green-strong); }
  button.mini { height: 30px; padding: 0 10px; font-size: 12px; border-radius: 8px; }
  a.botao { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .toolbar input { flex: 1; min-width: 160px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .badge.oferta { background: var(--green-bg); color: var(--green); }
  .badge.desc { background: var(--surface-2); color: var(--muted); }
  .badge.warn { background: var(--amber-bg); color: var(--amber); }
  .badge.alta { background: var(--red-bg); color: var(--red); }
  .badge.baixa { background: var(--green-bg); color: var(--green); }
  .metricas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 0.5rem; }
  .metrica { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 0.9rem 1rem; }
  .metrica .rotulo { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .metrica .valor { font-size: 22px; font-weight: 700; color: var(--green-strong); }
  .metrica .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .metrica.destaque { background: var(--green-bg); border-color: transparent; }
  .duplo { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
  .vazio { color: var(--muted); font-size: 13px; padding: 0.75rem 0; }
  .carregando { color: var(--muted); font-size: 13px; padding: 1rem 0; }
  .barra-fixa {
    position: fixed; left: 0; right: 0; bottom: 0; max-width: 1080px; margin: 0 auto;
    background: var(--surface); border-top: 1px solid var(--line-strong); box-shadow: 0 -2px 10px rgba(0,48,64,0.08);
    padding: 0.75rem 1rem; display: none; align-items: center; justify-content: space-between; gap: 12px; z-index: 10;
  }
  .barra-fixa .cont { font-size: 14px; font-weight: 600; }
  .troca { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .troca:last-child { border-bottom: none; }
  .troca .corpo { flex: 1; min-width: 0; font-size: 13px; }
  .troca .de { color: var(--muted); text-decoration: line-through; cursor: pointer; }
  .troca .para { color: var(--green); font-weight: 600; cursor: pointer; }
  .cabecalho-conta { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .cabecalho-conta .total { font-size: 16px; font-weight: 700; color: var(--green-strong); }
  .subsecao { background: var(--surface-2); border-radius: 10px; padding: 6px 12px; margin: 10px 0; }
  .subsecao .rot { font-size: 11px; font-weight: 700; color: var(--green-strong); text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 0; }
  .grupo-cab { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .chevron { transition: transform 0.15s; }
  .chevron.aberto { transform: rotate(180deg); }
  .promo-antigo { color: var(--muted); text-decoration: line-through; }
</style>
</head>
<body>
<div class="pagina">
  <div class="cabecalho">
    <h1>Auto Compras</h1>
  </div>

  <div class="abas">
    <div class="aba ativa" data-fase="lista">Lista de compras</div>
    <div class="aba" data-fase="checagem">Checagem de preço</div>
    <div class="aba" data-fase="comprar">Comprar</div>
  </div>

  <section class="secao visivel" id="secao-lista">
    <button class="botao primario" id="botao-ultimo" style="width:100%; justify-content:center; display:none; margin-bottom:0.75rem;">
      <i class="ti ti-shopping-cart"></i> Último carrinho &middot; <span id="ultimo-quando"></span>
    </button>

    <div class="toolbar">
      <input type="text" id="campo-link" placeholder="Para adicionar um item à Lista Recorrente, cole o link do produto">
      <button class="botao" id="botao-adicionar">Adicionar</button>
    </div>
    <div class="toolbar">
      <input type="text" id="campo-busca" placeholder="Buscar item">
      <button class="botao" id="botao-atualizar">Atualizar lista</button>
    </div>

    <div id="lista-itens"><p class="carregando">Carregando lista...</p></div>
  </section>

  <section class="secao" id="secao-checagem">
    <div class="toolbar">
      <button class="botao primario" id="botao-checar">Checar preços</button>
    </div>
    <div id="resultado-checagem"></div>
  </section>

  <section class="secao" id="secao-comprar">
    <div class="toolbar" id="comprar-toolbar" style="display:none">
      <button class="botao primario" id="botao-gravar-carrinho">Gravar carrinho</button>
      <button class="botao" id="botao-atualizar-base">Atualizar base de preços</button>
    </div>
    <div id="carrinhos"><p class="vazio">Faça a checagem de preço primeiro.</p></div>
  </section>
</div>

<div class="barra-fixa" id="barra-fixa">
  <span class="cont" id="barra-fixa-texto"></span>
  <button class="botao primario" id="botao-ir-checagem">Checar preços</button>
</div>

<script>
  window.onerror = function (m, o, l) {
    var alvo = document.getElementById('lista-itens');
    if (alvo) alvo.innerHTML = '<p class="vazio">Erro: ' + m + ' (linha ' + l + ')</p>';
  };

  var estado = {
    itens: [], contas: [], slotsPorConta: 10, cortePercent: 15,
    cartBase: '', accountUrl: '#', filtro: '', resultado: null,
    ultimoCarrinhoData: '', overridesOferta: {}, overridesConta: {},
    retiradosAberto: false, agregado: null
  };

  document.querySelectorAll('.aba').forEach(function (aba) {
    aba.addEventListener('click', function () { mudarFase(aba.dataset.fase); });
  });
  document.getElementById('campo-busca').addEventListener('input', function () {
    estado.filtro = this.value; renderizarLista();
  });
  document.getElementById('botao-atualizar').addEventListener('click', function () {
    var b = this; b.disabled = true; b.textContent = 'Atualizando...';
    google.script.run.withSuccessHandler(function () {
      b.disabled = false; b.textContent = 'Atualizar lista'; carregar();
    }).withFailureHandler(function () {
      b.disabled = false; b.textContent = 'Atualizar lista'; alert('Não consegui atualizar agora.');
    }).preencherImagens();
  });
  document.getElementById('botao-ultimo').addEventListener('click', abrirUltimoCarrinho);
  document.getElementById('botao-ir-checagem').addEventListener('click', function () {
    mudarFase('checagem'); document.getElementById('botao-checar').click();
  });
  document.getElementById('botao-gravar-carrinho').addEventListener('click', gravarUltimoCarrinho);
  document.getElementById('botao-atualizar-base').addEventListener('click', atualizarBase);

  function mudarFase(fase) {
    document.querySelectorAll('.aba').forEach(function (a) { a.classList.toggle('ativa', a.dataset.fase === fase); });
    document.querySelectorAll('.secao').forEach(function (s) { s.classList.remove('visivel'); });
    document.getElementById('secao-' + fase).classList.add('visivel');
    if (fase === 'comprar') renderComprar();
    atualizarBarraFixa();
  }

  function carregar() {
    google.script.run.withSuccessHandler(function (r) {
      estado.itens = r.itens; estado.contas = r.contas;
      estado.slotsPorConta = r.slotsPorConta; estado.cortePercent = r.cortePercent;
      estado.cartBase = r.cartBase; estado.accountUrl = r.accountUrl;
      estado.ultimoCarrinhoData = r.ultimoCarrinhoData || '';
      renderizarLista(); renderUltimoBotao();
    }).withFailureHandler(function () {
      document.getElementById('lista-itens').innerHTML = '<p class="vazio">Não consegui carregar a lista agora.</p>';
    }).obterEstadoInicial();
  }

  // ---------- Fase 1: lista ----------

  function renderUltimoBotao() {
    var b = document.getElementById('botao-ultimo');
    if (estado.ultimoCarrinhoData) {
      document.getElementById('ultimo-quando').textContent = estado.ultimoCarrinhoData;
      b.style.display = 'inline-flex';
    } else { b.style.display = 'none'; }
  }

  function abrirUltimoCarrinho() {
    var b = document.getElementById('botao-ultimo');
    b.disabled = true;
    google.script.run.withSuccessHandler(function (uc) {
      b.disabled = false;
      if (!uc || !uc.itens.length) { alert('Nenhum último carrinho gravado.'); return; }
      estado.resultado = { itens: uc.itens };
      estado.overridesOferta = uc.overridesOferta || {};
      estado.overridesConta = uc.overridesConta || {};
      estado.agregado = agregar();
      mudarFase('comprar');
    }).withFailureHandler(function () {
      b.disabled = false; alert('Não consegui abrir o último carrinho.');
    }).obterUltimoCarrinho();
  }

  function renderizarLista() {
    var container = document.getElementById('lista-itens');
    var filtro = normalizarBusca(estado.filtro);
    var ativos = estado.itens.filter(function (i) { return i.status !== 'retirado'; });
    var retirados = estado.itens.filter(function (i) { return i.status === 'retirado'; });
    if (filtro) ativos = ativos.filter(function (i) { return normalizarBusca(i.nome).indexOf(filtro) !== -1; });
    ativos.sort(function (a, b) { return a.nome.localeCompare(b.nome, 'pt-BR'); });
    retirados.sort(function (a, b) { return a.nome.localeCompare(b.nome, 'pt-BR'); });

    var html = '';
    if (!estado.itens.length) {
      html += '<p class="vazio">Nenhum item na lista ainda. Adicione um produto por link acima.</p>';
    } else if (!ativos.length) {
      html += '<p class="vazio">Nenhum item encontrado para "' + escaparHtml(estado.filtro) + '".</p>';
    } else {
      html += '<h3>Lista Recorrente</h3><div class="cartao">' + ativos.map(linhaItemHtml).join('') + '</div>';
    }
    if (retirados.length && !filtro) {
      html += '<div class="grupo-cab" id="cab-retirados"><h3 style="margin:1.5rem 0 0.5rem">Itens retirados (' + retirados.length + ')</h3>' +
        '<i class="ti ti-chevron-down chevron' + (estado.retiradosAberto ? ' aberto' : '') + '"></i></div>';
      if (estado.retiradosAberto) {
        html += '<div class="cartao">' + retirados.map(linhaItemHtml).join('') + '</div>';
      }
    }
    container.innerHTML = html;
    ligarEventosLista();
    atualizarBarraFixa();
  }

  function linhaItemHtml(item) {
    var precoTexto = item.precoReferencia != null ? formatMoney(item.precoReferencia) : 'sem preço de referência';
    var retirado = item.status === 'retirado';
    var qty = retirado ? 0 : (item.quantidadeAtual || 0);
    var controle = retirado
      ? '<button class="botao mini primario" data-acao="reativar" data-key="' + item.key + '">Recolocar</button>'
      : '<div class="stepper">' +
        '<button data-acao="menos" data-key="' + item.key + '">&minus;</button>' +
        '<span>' + qty + '</span>' +
        '<button data-acao="mais" data-key="' + item.key + '">+</button>' +
        '</div>' +
        '<button class="botao-x" data-acao="retirar" data-key="' + item.key + '" title="Retirar da Lista Recorrente"><i class="ti ti-trash"></i></button>';

    return '<div class="linha-item' + (qty > 0 ? ' selecionado' : '') + '" data-abrir="' + item.key + '">' +
      miniaturaHtml(item.imagem, false) +
      '<div class="info-item"><p class="nome">' + escaparHtml(item.nome) + '</p><p class="preco">' + precoTexto + '</p></div>' +
      controle + '</div>';
  }

  function miniaturaHtml(url, pequena) {
    var cls = 'miniatura' + (pequena ? ' pequena' : '');
    if (url) return '<img class="' + cls + '" src="' + url + '" onerror="this.style.visibility=\'hidden\'">';
    return '<div class="' + cls + '"></div>';
  }

  function ligarEventosLista() {
    var cab = document.getElementById('cab-retirados');
    if (cab) cab.addEventListener('click', function () { estado.retiradosAberto = !estado.retiradosAberto; renderizarLista(); });
    document.querySelectorAll('#lista-itens [data-abrir]').forEach(function (linha) {
      linha.addEventListener('click', function () {
        var item = estado.itens.find(function (i) { return i.key === linha.dataset.abrir; });
        if (item) abrirNoZonaSul(item.link, item.termoBusca || item.nome);
      });
    });
    document.querySelectorAll('#lista-itens [data-acao="mais"]').forEach(function (b) {
      b.addEventListener('click', function (e) { e.stopPropagation(); alterarQuantidade(b.dataset.key, 1); });
    });
    document.querySelectorAll('#lista-itens [data-acao="menos"]').forEach(function (b) {
      b.addEventListener('click', function (e) { e.stopPropagation(); alterarQuantidade(b.dataset.key, -1); });
    });
    document.querySelectorAll('#lista-itens [data-acao="retirar"]').forEach(function (b) {
      b.addEventListener('click', function (e) {
        e.stopPropagation();
        if (!confirm('Retirar este item da Lista Recorrente?')) return;
        google.script.run.withSuccessHandler(carregar).retirarItem(b.dataset.key);
      });
    });
    document.querySelectorAll('#lista-itens [data-acao="reativar"]').forEach(function (b) {
      b.addEventListener('click', function (e) {
        e.stopPropagation();
        google.script.run.withSuccessHandler(carregar).reativarItem(b.dataset.key);
      });
    });
  }

  function alterarQuantidade(key, delta) {
    var item = estado.itens.find(function (i) { return i.key === key; });
    if (!item) return;
    item.quantidadeAtual = Math.max(0, (item.quantidadeAtual || 0) + delta);
    renderizarLista();
  }

  function abrirNoZonaSul(link, termo) {
    var url = link || ('https://www.zonasul.com.br/' + encodeURIComponent(termo || ''));
    window.open(url, '_blank');
  }

  function atualizarBarraFixa() {
    var barra = document.getElementById('barra-fixa');
    var faseAtual = document.querySelector('.aba.ativa').dataset.fase;
    var n = selecionadosLista().length;
    if (faseAtual !== 'lista' || !n) { barra.style.display = 'none'; return; }
    barra.style.display = 'flex';
    document.getElementById('barra-fixa-texto').textContent = n + (n > 1 ? ' itens selecionados' : ' item selecionado');
  }

  document.getElementById('botao-adicionar').addEventListener('click', function () {
    var url = document.getElementById('campo-link').value.trim();
    if (!url) return;
    var botao = this; botao.disabled = true; botao.textContent = 'Adicionando...';
    google.script.run.withSuccessHandler(function () {
      botao.disabled = false; botao.textContent = 'Adicionar';
      document.getElementById('campo-link').value = ''; carregar();
    }).withFailureHandler(function (erro) {
      botao.disabled = false; botao.textContent = 'Adicionar';
      alert(erro.message || 'Não consegui adicionar este item.');
    }).adicionarItemPorLink(url);
  });

  function selecionadosLista() {
    return estado.itens.filter(function (i) { return i.status !== 'retirado' && (i.quantidadeAtual || 0) > 0; });
  }

  // ---------- Fase 2: checagem ----------

  document.getElementById('botao-checar').addEventListener('click', function () {
    var solicitados = selecionadosLista().map(function (i) {
      return { key: i.key, nome: i.nome, termoBusca: i.termoBusca, segmento: i.segmento, precoReferencia: i.precoReferencia, quantidade: i.quantidadeAtual };
    });
    if (!solicitados.length) {
      document.getElementById('resultado-checagem').innerHTML = '<p class="vazio">Marque a quantidade de pelo menos um item na fase 1.</p>';
      return;
    }
    var botao = this; botao.disabled = true; botao.textContent = 'Consultando...';
    document.getElementById('resultado-checagem').innerHTML = '<p class="carregando">Consultando o Zona Sul, aguarde...</p>';
    google.script.run.withSuccessHandler(function (r) {
      botao.disabled = false; botao.textContent = 'Recarregar preços';
      estado.resultado = r; estado.overridesOferta = {}; estado.overridesConta = {};
      renderFase2();
    }).withFailureHandler(function (erro) {
      botao.disabled = false; botao.textContent = 'Checar preços';
      document.getElementById('resultado-checagem').innerHTML = '<p class="vazio">' + (erro.message || 'Falha consultando o Zona Sul.') + '</p>';
    }).checarPrecos(solicitados);
  });

  function agregar() {
    var itens = estado.resultado.itens;
    var comSel = itens.filter(function (i) { return i.selecionado; });
    var comErro = itens.filter(function (i) { return i.erro; });
    var totalCotado = round(comSel.reduce(function (s, i) { return s + i.selecionado.total; }, 0));
    var elegiveis = comSel.filter(function (i) { return i.selecionado.elegivelMinhasOfertas; });

    var elegSorted = elegiveis.slice().sort(function (a, b) {
      return b.selecionado.economiaPotencial - a.selecionado.economiaPotencial || b.selecionado.total - a.selecionado.total;
    });
    var slotTotal = estado.slotsPorConta * estado.contas.length;
    var defaultOferta = {}; elegSorted.slice(0, slotTotal).forEach(function (i) { defaultOferta[i.key] = true; });
    function isOferta(i) {
      var ov = estado.overridesOferta[i.key];
      if (ov === 'oferta') return true;
      if (ov === 'normal') return false;
      return !!defaultOferta[i.key];
    }
    var ofertaItens = comSel.filter(isOferta);
    var normalItens = comSel.filter(function (i) { return !isOferta(i); });
    var economiaOfertas = round(ofertaItens.filter(function (i) { return i.selecionado.elegivelMinhasOfertas; })
      .reduce(function (s, i) { return s + i.selecionado.economiaPotencial; }, 0));

    var comRef = comSel.filter(function (i) { return i.precoReferencia != null; });
    var acima = comRef.filter(function (i) { return i.selecionado.preco > i.precoReferencia; })
      .map(function (i) { return { item: i, pct: (i.selecionado.preco - i.precoReferencia) / i.precoReferencia * 100 }; })
      .sort(function (a, b) { return b.pct - a.pct; }).slice(0, 10);
    var abaixo = comRef.filter(function (i) { return i.selecionado.preco < i.precoReferencia; })
      .map(function (i) { return { item: i, pct: (i.precoReferencia - i.selecionado.preco) / i.precoReferencia * 100 }; })
      .sort(function (a, b) { return b.pct - a.pct; }).slice(0, 10);

    // Insights de troca: só alternativas MAIS BARATAS por unidade, do mesmo tipo de embalagem.
    var insights = [];
    comSel.forEach(function (i) {
      var atual = i.selecionado, melhor = null;
      (i.alternativas || []).forEach(function (alt) {
        if (alt.metricaTipo !== atual.metricaTipo) return;
        if (alt.precoUnitario < atual.precoUnitario * 0.97 && (!melhor || alt.precoUnitario < melhor.precoUnitario)) melhor = alt;
      });
      if (melhor) {
        var economiaPct = (atual.precoUnitario - melhor.precoUnitario) / atual.precoUnitario * 100;
        insights.push({ key: i.key, atual: atual, sugerido: melhor, economiaPct: economiaPct });
      }
    });
    insights.sort(function (a, b) { return b.economiaPct - a.economiaPct; });

    return {
      comSel: comSel, comErro: comErro, totalCotado: totalCotado, elegiveis: elegiveis,
      ofertaItens: ofertaItens, normalItens: normalItens, economiaOfertas: economiaOfertas,
      estimadoFinal: round(totalCotado - economiaOfertas), acima: acima, abaixo: abaixo,
      insights: insights, isOferta: isOferta
    };
  }

  function renderFase2() {
    var a = agregar();
    estado.agregado = a;
    var html = '';

    // RESUMO
    html += '<h3>Resumo</h3><div class="metricas">' +
      metricaHtml('Total cotado', formatMoney(a.totalCotado), a.comSel.length + ' itens') +
      metricaHtml('Desconto Minhas Ofertas', '&minus;' + formatMoney(a.economiaOfertas), 'estimado') +
      metricaHtml('Estimado final', formatMoney(a.estimadoFinal), 'após descontos', true) +
      metricaHtml('Elegíveis a desconto', String(a.elegiveis.length), 'desc. atual < ' + estado.cortePercent + '%') +
      '</div>';
    if (a.comErro.length) {
      html += '<div class="cartao pad"><p style="font-size:13px;color:var(--muted)">Sem produto disponível no Zona Sul agora: ' +
        a.comErro.map(function (e) { return escaparHtml(e.nome); }).join(', ') + '</p></div>';
    }

    // INSIGHTS DE TROCA
    html += '<h3>Insights de troca</h3>';
    if (!a.insights.length) {
      html += '<div class="cartao pad"><p class="vazio">Nenhuma alternativa mais barata por unidade encontrada.</p></div>';
    } else {
      html += '<div class="cartao">' + a.insights.map(function (t) {
        return '<div class="troca">' + miniaturaHtml(t.sugerido.imagem, true) +
          '<div class="corpo">' +
          '<p class="de" data-link-atual="' + t.key + '">' + escaparHtml(t.atual.nome) + ' &middot; ' + t.atual.precoUnitarioLabel + '</p>' +
          '<p class="para" data-link-sug="' + t.key + '">' + escaparHtml(t.sugerido.nome) + ' &middot; ' + t.sugerido.precoUnitarioLabel + '</p>' +
          '</div><span class="badge baixa" style="margin-right:6px">&minus;' + t.economiaPct.toFixed(0) + '%</span>' +
          '<button class="botao mini" data-trocar="' + t.key + '" data-sku="' + t.sugerido.sku + '">Trocar</button></div>';
      }).join('') + '</div>';
    }

    // TOP 10 ACIMA / ABAIXO
    html += '<h3>Comparado ao preço histórico</h3><div class="duplo">' +
      colunaTopHtml('Top 10 acima', a.acima, 'alta', '+') +
      colunaTopHtml('Top 10 abaixo', a.abaixo, 'baixa', '&minus;') +
      '</div>';

    // CARRINHOS
    html += '<h3>Carrinhos</h3><div class="duplo">' +
      colunaCarrinhoHtml('Minhas Ofertas &middot; ' + a.ofertaItens.length + '/' + (estado.slotsPorConta * estado.contas.length), a.ofertaItens, 'ti-arrow-right') +
      colunaCarrinhoHtml('Carrinho normal', a.normalItens, 'ti-arrow-left') +
      '</div>';

    document.getElementById('resultado-checagem').innerHTML = html;
    ligarEventosFase2();
  }

  function colunaTopHtml(titulo, lista, badgeCls, sinal) {
    var corpo = lista.length
      ? lista.map(function (x) {
          return '<div class="linha-item" data-abrir="' + x.item.key + '">' + miniaturaHtml(x.item.selecionado.imagem, true) +
            '<div class="info-item"><p class="nome">' + escaparHtml(x.item.selecionado.nome) + '</p>' +
            '<p class="preco">hoje ' + formatMoney(x.item.selecionado.preco) + ' &middot; ref ' + formatMoney(x.item.precoReferencia) + '</p></div>' +
            '<span class="badge ' + badgeCls + '">' + sinal + x.pct.toFixed(0) + '%</span></div>';
        }).join('')
      : '<p class="vazio">Nada aqui.</p>';
    return '<div class="cartao"><h2>' + titulo + '</h2>' + corpo + '</div>';
  }

  function precoLinhaHtml(i) {
    var s = i.selecionado;
    var promo = s.precoLista > s.preco + 0.001;
    var atual = promo
      ? '<span class="promo-antigo">' + formatMoney(s.precoLista) + '</span> <span class="badge baixa" style="padding:1px 6px">&minus;' + s.descontoAtualPercent.toFixed(0) + '%</span> ' + formatMoney(s.preco)
      : formatMoney(s.preco);
    var ref = i.precoReferencia != null ? ' &middot; última ' + formatMoney(i.precoReferencia) : '';
    return i.quantidade + '× ' + atual + ref;
  }

  function colunaCarrinhoHtml(titulo, lista, acaoIcone) {
    var total = round(lista.reduce(function (s, i) { return s + i.selecionado.total; }, 0));
    var corpo = lista.length
      ? lista.map(function (i) {
          var s = i.selecionado;
          return '<div class="linha-item">' + miniaturaHtml(s.imagem, true) +
            '<div class="info-item" data-abrir="' + i.key + '" style="cursor:pointer"><p class="nome">' + escaparHtml(s.nome) + '</p>' +
            '<p class="preco">' + precoLinhaHtml(i) + '</p></div>' +
            '<button class="botao-x" data-mover="' + i.key + '" title="Mover para o outro carrinho"><i class="ti ' + acaoIcone + '"></i></button></div>';
        }).join('')
      : '<p class="vazio">Vazio.</p>';
    return '<div class="cartao"><div class="cabecalho-conta"><h2 style="margin:0">' + titulo + '</h2><span class="total">' + formatMoney(total) + '</span></div>' + corpo + '</div>';
  }

  function ligarEventosFase2() {
    document.querySelectorAll('#resultado-checagem [data-abrir]').forEach(function (el) {
      el.addEventListener('click', function () {
        var i = estado.resultado.itens.find(function (x) { return x.key === el.dataset.abrir; });
        if (i && i.selecionado) abrirNoZonaSul(i.selecionado.link, i.nome);
      });
    });
    document.querySelectorAll('[data-link-atual]').forEach(function (el) {
      el.addEventListener('click', function () {
        var i = estado.resultado.itens.find(function (x) { return x.key === el.dataset.linkAtual; });
        if (i && i.selecionado) abrirNoZonaSul(i.selecionado.link, i.nome);
      });
    });
    document.querySelectorAll('[data-link-sug]').forEach(function (el) {
      el.addEventListener('click', function () {
        var t = estado.agregado.insights.find(function (x) { return x.key === el.dataset.linkSug; });
        if (t) abrirNoZonaSul(t.sugerido.link, t.sugerido.nome);
      });
    });
    document.querySelectorAll('[data-trocar]').forEach(function (b) {
      b.addEventListener('click', function (e) { e.stopPropagation(); trocarProduto(b.dataset.trocar, b.dataset.sku); });
    });
    document.querySelectorAll('[data-mover]').forEach(function (b) {
      b.addEventListener('click', function (e) { e.stopPropagation(); moverCarrinho(b.dataset.mover); });
    });
  }

  function moverCarrinho(key) {
    var item = estado.resultado.itens.find(function (i) { return i.key === key; });
    if (!item) return;
    var atual = estado.agregado.isOferta(item);
    estado.overridesOferta[key] = atual ? 'normal' : 'oferta';
    renderFase2();
  }

  function trocarProduto(key, sku) {
    var item = estado.resultado.itens.find(function (i) { return i.key === key; });
    if (!item) return;
    var idx = (item.alternativas || []).findIndex(function (a) { return a.sku === sku; });
    if (idx < 0) return;
    var novo = item.alternativas[idx];
    item.alternativas[idx] = item.selecionado;
    item.selecionado = novo;
    renderFase2();
  }

  // ---------- Fase 3: comprar (Erico / Dani) ----------

  function assignComprar() {
    var a = estado.agregado;
    var slots = estado.slotsPorConta;
    var ofertaSorted = a.ofertaItens.slice().sort(function (x, y) { return y.selecionado.economiaPotencial - x.selecionado.economiaPotencial; });
    var assign = {}, totais = {};
    estado.contas.forEach(function (c) { totais[c.key] = 0; });
    ofertaSorted.forEach(function (i, idx) {
      var padrao = idx < slots ? estado.contas[0].key : (estado.contas[1] ? estado.contas[1].key : estado.contas[0].key);
      var ck = estado.overridesConta[i.key] || padrao;
      assign[i.key] = ck; totais[ck] += i.selecionado.total;
    });
    a.normalItens.forEach(function (i) {
      var ck = estado.overridesConta[i.key] || escolherConta(i, totais);
      assign[i.key] = ck; totais[ck] += i.selecionado.total;
    });
    return { assign: assign, totais: totais, ofertaKeys: keySet(a.ofertaItens) };
  }

  function keySet(lista) { var s = {}; lista.forEach(function (i) { s[i.key] = true; }); return s; }

  function renderComprar() {
    document.getElementById('comprar-toolbar').style.display = estado.agregado ? 'flex' : 'none';
    if (!estado.agregado) {
      document.getElementById('carrinhos').innerHTML = '<p class="vazio">Faça a checagem de preço primeiro.</p>';
      return;
    }
    var a = estado.agregado;
    var res = assignComprar();
    var porConta = {};
    estado.contas.forEach(function (c) { porConta[c.key] = { ofertas: [], outros: [] }; });
    a.comSel.forEach(function (i) {
      var ck = res.assign[i.key];
      if (!porConta[ck]) return;
      if (res.ofertaKeys[i.key]) porConta[ck].ofertas.push(i); else porConta[ck].outros.push(i);
    });

    var ordem = ['dani', 'erico'].filter(function (k) { return estado.contas.some(function (c) { return c.key === k; }); });
    if (ordem.length < estado.contas.length) ordem = estado.contas.map(function (c) { return c.key; });

    var html = '<div class="duplo">' + ordem.map(function (ck) {
      var conta = estado.contas.find(function (c) { return c.key === ck; });
      var g = porConta[ck];
      var lista = g.ofertas.concat(g.outros);
      var cartUrl = montarCartUrl(lista);
      return '<div class="cartao pad">' +
        '<div class="cabecalho-conta"><h2 style="margin:0">Carrinho ' + escaparHtml(conta.label) + '</h2><span class="total">' + formatMoney(round(res.totais[ck])) + '</span></div>' +
        (cartUrl ? '<a class="botao primario" style="margin:8px 0 4px" href="' + cartUrl + '" target="_blank">Abrir carrinho no Zona Sul</a>' : '') +
        '<div class="subsecao"><p class="rot">Minhas Ofertas</p>' +
        (g.ofertas.length ? g.ofertas.map(function (i) { return linhaCompraHtml(i, ck); }).join('') : '<p class="vazio">Nenhuma.</p>') + '</div>' +
        '<div class="subsecao"><p class="rot">Outros itens</p>' +
        (g.outros.length ? g.outros.map(function (i) { return linhaCompraHtml(i, ck); }).join('') : '<p class="vazio">Nenhum.</p>') + '</div>' +
        '</div>';
    }).join('') + '</div>';

    document.getElementById('carrinhos').innerHTML = html;
    document.querySelectorAll('#carrinhos [data-abrir]').forEach(function (el) {
      el.addEventListener('click', function () {
        var i = estado.resultado.itens.find(function (x) { return x.key === el.dataset.abrir; });
        if (i && i.selecionado) abrirNoZonaSul(i.selecionado.link, i.nome);
      });
    });
    document.querySelectorAll('#carrinhos [data-mover-conta]').forEach(function (b) {
      b.addEventListener('click', function (e) { e.stopPropagation(); moverConta(b.dataset.moverConta, b.dataset.atual); });
    });
  }

  function linhaCompraHtml(i, contaAtual) {
    var s = i.selecionado;
    return '<div class="linha-item">' + miniaturaHtml(s.imagem, true) +
      '<div class="info-item" data-abrir="' + i.key + '" style="cursor:pointer"><p class="nome">' + escaparHtml(s.nome) + '</p>' +
      '<p class="preco">' + i.quantidade + '× ' + formatMoney(s.preco) + ' &middot; ' + formatMoney(s.total) + '</p></div>' +
      '<button class="botao-x" data-mover-conta="' + i.key + '" data-atual="' + contaAtual + '" title="Mover para o outro carrinho"><i class="ti ti-transfer"></i></button></div>';
  }

  function moverConta(key, atual) {
    var outras = estado.contas.map(function (c) { return c.key; }).filter(function (k) { return k !== atual; });
    if (!outras.length) return;
    estado.overridesConta[key] = outras[0];
    renderComprar();
  }

  function gravarUltimoCarrinho() {
    if (!estado.agregado) { alert('Faça a checagem de preço primeiro.'); return; }
    var itens = estado.resultado.itens.filter(function (i) { return i.selecionado; }).map(function (i) {
      return { key: i.key, nome: i.nome, segmento: i.segmento, quantidade: i.quantidade, precoReferencia: i.precoReferencia, selecionado: i.selecionado };
    });
    var payload = { itens: itens, overridesOferta: estado.overridesOferta, overridesConta: estado.overridesConta };
    var b = document.getElementById('botao-gravar-carrinho');
    b.disabled = true; b.textContent = 'Gravando...';
    google.script.run.withSuccessHandler(function (r) {
      b.disabled = false; b.textContent = 'Gravar carrinho';
      estado.ultimoCarrinhoData = r.data; renderUltimoBotao();
      alert('Último carrinho gravado.');
    }).withFailureHandler(function () {
      b.disabled = false; b.textContent = 'Gravar carrinho'; alert('Não consegui gravar agora.');
    }).gravarUltimoCarrinho(payload);
  }

  function atualizarBase() {
    if (!estado.agregado) { alert('Faça a checagem de preço primeiro.'); return; }
    var itens = estado.resultado.itens.filter(function (i) { return i.selecionado; }).map(function (i) {
      return { key: i.key, nome: i.selecionado.nome, preco: i.selecionado.preco, quantidade: i.quantidade };
    });
    if (!confirm('Atualizar o preço de referência de ' + itens.length + ' itens da Lista Recorrente com os preços cotados agora? O histórico anterior fica guardado.')) return;
    var b = document.getElementById('botao-atualizar-base');
    b.disabled = true; b.textContent = 'Atualizando...';
    google.script.run.withSuccessHandler(function (r) {
      b.disabled = false; b.textContent = 'Atualizar base de preços';
      alert(r.atualizados + ' itens atualizados na base. Histórico guardado com a data.');
      carregar();
    }).withFailureHandler(function () {
      b.disabled = false; b.textContent = 'Atualizar base de preços'; alert('Não consegui atualizar agora.');
    }).atualizarBasePrecos(itens);
  }

  function escolherConta(item, totais) {
    var seg = normalizarBusca(item.segmento || '');
    if (seg.indexOf('pereci') !== -1 && totais.hasOwnProperty('dani')) return 'dani';
    if ((seg.indexOf('limpeza') !== -1 || seg.indexOf('pesado') !== -1) && totais.hasOwnProperty('erico')) return 'erico';
    var chaves = Object.keys(totais);
    return chaves.reduce(function (m, k) { return totais[k] < totais[m] ? k : m; }, chaves[0]);
  }

  function montarCartUrl(lista) {
    if (!lista.length) return null;
    var p = [];
    lista.forEach(function (i) {
      p.push('sku=' + encodeURIComponent(i.selecionado.sku));
      p.push('qty=' + encodeURIComponent(i.quantidade));
      p.push('seller=' + encodeURIComponent(i.selecionado.sellerId || '1'));
    });
    p.push('sc=1');
    return estado.cartBase + '?' + p.join('&');
  }

  // ---------- helpers ----------

  function metricaHtml(rotulo, valor, sub, destaque) {
    return '<div class="metrica' + (destaque ? ' destaque' : '') + '"><p class="rotulo">' + rotulo + '</p>' +
      '<p class="valor">' + valor + '</p>' + (sub ? '<p class="sub">' + sub + '</p>' : '') + '</div>';
  }
  function formatMoney(v) { return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }
  function round(v) { return Math.round(Number(v) * 100) / 100; }
  function escaparHtml(t) { var d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
  function normalizarBusca(t) {
    return String(t || '').normalize('NFD').replace(new RegExp('[' + String.fromCharCode(0x0300) + '-' + String.fromCharCode(0x036f) + ']', 'g'), '').toLowerCase();
  }

  carregar();
</script>
</body>
</html>
